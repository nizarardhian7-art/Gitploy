name: Auto Extract ZIP

on:
  push:
    paths:
      - '**/*.zip'
  workflow_dispatch:

jobs:
  extract-and-commit:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Extract ZIP files
        run: |
          # Membantu agar looping aman jika tidak ada file .zip
          shopt -s nullglob globstar
          
          # Cari semua file .zip di seluruh repository
          for f in **/*.zip; do
            if [ -f "$f" ]; then
              echo "➡ Menemukan file: $f. Mengekstrak..."
              
              # Menentukan direktori lokasi file zip tersebut berada
              DIR=$(dirname "$f")
              
              # Mengekstrak isi ZIP di folder tempat ZIP itu berada (timpa jika ada)
              unzip -q -o "$f" -d "$DIR"
              
              # Hapus file ZIP setelah sukses diekstrak agar repo tidak bengkak
              rm "$f"
              
              echo "✅ Selesai mengekstrak: $f"
            fi
          done

      - name: Commit and Push
        run: |
          # Konfigurasi identitas Bot GitHub
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          # Tambahkan semua file yang baru saja diekstrak
          git add .
          
          # Lakukan commit, abaikan jika ternyata tidak ada file baru yang berubah
          git commit -m "chore: auto-extract uploaded ZIP folder" || echo "No changes to commit"
          
          # Push hasilnya kembali ke repository Anda
          git push
