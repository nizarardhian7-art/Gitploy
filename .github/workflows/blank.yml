name: Auto Extract ZIP

on:
  push:
    paths:
      - '**/*.zip'
  workflow_dispatch:

jobs:
  extract-and-commit:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Extract ZIP files
        run: |
          shopt -s nullglob globstar
          
          for f in **/*.zip; do
            if [ -f "$f" ]; then
              echo "Mengekstrak $f..."
              DIR=$(dirname "$f")
              unzip -q -o "$f" -d "$DIR"
              rm "$f"
            fi
          done

      - name: Cegah error GitHub Security (Buang isi workflow dari ZIP)
        run: |
          # Mengembalikan folder .github/workflows ke kondisi awal
          # (mencegah file build.yml dari ZIP ikut ter-push dan bikin error)
          git checkout -- .github/workflows/ || true
          git clean -fd .github/workflows/ || true

      - name: Commit and Push
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          
          git add .
          git commit -m "chore: auto-extract ZIP and ignore workflow overrides" || echo "No changes to commit"
          git push
