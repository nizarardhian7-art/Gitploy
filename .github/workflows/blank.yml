name: Build Release APK

on:
  workflow_dispatch:
    inputs:
      sign_apk:
        description: 'Sign APK'
        required: false
        default: 'false'
        type: choice
        options:
          - 'false'
          - 'true'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Install Gradle
        run: |
          wget -q https://services.gradle.org/distributions/gradle-8.4-bin.zip -O /tmp/gradle.zip
          unzip -q /tmp/gradle.zip -d /opt/gradle
          /opt/gradle/gradle-8.4/bin/gradle wrapper --gradle-version 8.4 --distribution-type bin

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Accept licenses
        run: yes | sdkmanager --licenses || true

      - name: Make gradlew executable
        run: chmod +x gradlew

      - name: Inject build timestamp for app expiry
        run: |
          BUILD_MS=$(date +%s%3N)
          sed -i "s/private static final long BUILD_TIME_MS  = [0-9]*L;/private static final long BUILD_TIME_MS  = ${BUILD_MS}L;/" \
            app/src/main/java/com/gitdeploy/app/MainActivity.java
          echo "Build timestamp injected: $BUILD_MS"

      - name: Build Release APK
        run: ./gradlew assembleRelease --stacktrace

      - name: Sign APK
        if: ${{ inputs.sign_apk == 'true' && vars.SIGNING_ALIAS != '' }}
        run: |
          APK=$(find app/build/outputs/apk/release -name "*.apk" ! -name "signed*" | head -1)
          echo "Signing: $APK"
          $ANDROID_HOME/build-tools/33.0.1/apksigner sign \
            --ks "${{ vars.SIGNING_KEY_PATH }}" \
            --ks-key-alias "${{ vars.SIGNING_ALIAS }}" \
            --ks-pass "pass:${{ vars.SIGNING_STORE_PASS }}" \
            --key-pass "pass:${{ vars.SIGNING_KEY_PASS }}" \
            --out "app/build/outputs/apk/release/signed-release.apk" \
            "$APK"

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: release-apk
          path: app/build/outputs/apk/release/*.apk
          retention-days: 30
